<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ThreatMail AI — Gap Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#07090f;--s1:#0c0f1a;--s2:#111827;--border:#1e2d44;--border2:#243044;--cyan:#22d3ee;--red:#f43f5e;--green:#10b981;--gold:#f59e0b;--text:#cbd5e1;--text2:#64748b;--white:#f1f5f9;--mono:'IBM Plex Mono',monospace;--sans:'Inter',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;background-image:radial-gradient(ellipse 60% 40% at 15% 0%,rgba(34,211,238,0.05) 0%,transparent 60%);}
a{text-decoration:none;color:inherit;}
nav{height:58px;border-bottom:1px solid var(--border);background:rgba(7,9,15,0.96);backdrop-filter:blur(20px);position:sticky;top:0;z-index:200;display:flex;align-items:center;padding:0 32px;}
.nb{display:flex;align-items:center;gap:10px;margin-right:36px;}
.ni{width:30px;height:30px;background:linear-gradient(135deg,#22d3ee,#f43f5e);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;color:#000;}
.nt{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--white);letter-spacing:1.5px;}
.nls{display:flex;gap:2px;}
.nl{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;color:var(--text2);transition:all 0.15s;}
.nl:hover{color:var(--white);background:rgba(255,255,255,0.06);}
.nl.active{color:var(--cyan);background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);}
.nr{margin-left:auto;font-size:11px;color:var(--text2);font-family:var(--mono);display:flex;align-items:center;gap:6px;}
.nd{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.wrap{max-width:1060px;margin:0 auto;padding:36px 20px 80px;}
.ptag{font-family:var(--mono);font-size:10px;color:var(--cyan);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;}
.ptitle{font-size:24px;font-weight:700;color:var(--white);margin-bottom:6px;letter-spacing:-0.3px;}
.psub{font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.6;}
.card{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:16px;}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
.bc{background:rgba(244,63,94,0.15);color:#f43f5e;border:1px solid rgba(244,63,94,0.3);}
.bh{background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.3);}
.bm{background:rgba(234,179,8,0.1);color:#eab308;border:1px solid rgba(234,179,8,0.3);}
.bl{background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.3);}
.bo{background:rgba(34,211,238,0.1);color:#22d3ee;border:1px solid rgba(34,211,238,0.2);}
.bw{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
.bd2{background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.25);}
.bf{background:rgba(244,63,94,0.1);color:#f87171;border:1px solid rgba(244,63,94,0.25);}
table{width:100%;border-collapse:collapse;}
th{padding:10px 14px;text-align:left;font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--border);background:rgba(34,211,238,0.02);}
td{padding:11px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);}
tr:hover td{background:rgba(255,255,255,0.015);cursor:pointer;}
tr:last-child td{border-bottom:none;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.sb{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
.sn{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--white);}
.sl{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:2px;margin-top:4px;}
input[type=text],select{background:var(--s1);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:11px;padding:8px 12px;outline:none;}
input[type=text]:focus,select:focus{border-color:var(--cyan);}
.btn{padding:8px 18px;border-radius:7px;font-family:var(--mono);font-size:11px;font-weight:600;cursor:pointer;border:none;transition:opacity 0.2s;}
.btn:hover{opacity:0.8;}
.bpri{background:linear-gradient(135deg,#22d3ee,#06b6d4);color:#000;}
.bgho{background:transparent;color:var(--text2);border:1px solid var(--border);}
.bgho:hover{color:var(--white);border-color:var(--text2);}
.bgrn{background:rgba(16,185,129,0.1);color:#10b981;border:1px solid rgba(16,185,129,0.25);}
.bred{background:rgba(244,63,94,0.1);color:#f43f5e;border:1px solid rgba(244,63,94,0.25);}
.bgld{background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);}
.empty{text-align:center;padding:60px;color:var(--text2);}
.mdbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:center;justify-content:center;}
.mdbg.open{display:flex;}
.md{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:28px;width:90%;max-width:680px;max-height:90vh;overflow-y:auto;}
.mdt{font-size:18px;font-weight:700;color:var(--white);margin-bottom:20px;}
.kv{border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:14px;}
.kvr{display:grid;grid-template-columns:180px 1fr;}
.kvr:not(:last-child){border-bottom:1px solid var(--border);}
.kvl{padding:9px 13px;background:rgba(34,211,238,0.025);border-right:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text2);}
.kvv{padding:9px 13px;font-size:13px;color:var(--text);line-height:1.5;}
textarea.notes{width:100%;background:var(--s1);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;padding:10px;resize:vertical;outline:none;min-height:80px;margin-top:8px;}
.filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
</style></head><body><nav><div class="nb"><div class="ni">TM</div><span class="nt">THREATMAIL</span></div>
<div class="nls"><a href="/" class="nl">Analyze</a><a href="/tracker" class="nl">Tracker</a><a href="/takedowns" class="nl">Takedowns</a><a href="/gap-library" class="nl active">Gap Library</a><a href="/dashboard" class="nl">Dashboard</a></div>
<div class="nr"><span class="nd"></span>Built by Sunidhi Vishwakarma</div></nav>
<div class="wrap">
<div class="ptag">Module 04</div><div class="ptitle">Detection Gap Library</div>
<div class="psub">Every RCA auto-saves its detection gap explanation here. Search, copy, reuse — stop writing the same thing twice.</div>
<div class="card" style="display:flex;gap:12px;align-items:center;padding:16px 22px;margin-bottom:16px;">
<input type="text" id="q" placeholder="Search gaps..." oninput="filt()" style="flex:1;"/>
<span id="cnt" style="font-family:var(--mono);font-size:11px;color:var(--text2);flex-shrink:0;"></span>
</div>
<div id="list"></div>
</div>
<script>
let all=[];
async function load(){const r=await fetch('/api/gaps');all=await r.json();filt();}
function filt(){const q=document.getElementById('q').value.toLowerCase();
const f=all.filter(g=>!q||[g.gap_title,g.detection_gap_explanation,g.platform,g.escalation_type].join(' ').toLowerCase().includes(q));
document.getElementById('cnt').textContent=`${f.length} of ${all.length} gaps`;
document.getElementById('list').innerHTML=f.length?f.map(g=>`
<div style="background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:14px;">
<div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:14px;">
<div style="flex:1;"><div style="font-size:15px;font-weight:600;color:var(--white);margin-bottom:8px;">${g.gap_title||'Detection Gap'}</div>
<div style="display:flex;gap:6px;flex-wrap:wrap;">
${g.escalation_type?`<span class="badge bm">${g.escalation_type.replace(/_/g,' ')}</span>`:''}
${g.platform?`<span class="badge bo">${g.platform}</span>`:''}
</div></div>
<span style="background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.2);color:#22d3ee;font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:6px;flex-shrink:0;">Used ${g.usage_count||1}×</span>
</div>
<div style="background:var(--s1);border-left:3px solid #f59e0b;border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:14px;font-size:13px;color:var(--text);line-height:1.75;">${g.detection_gap_explanation||'—'}</div>
<div style="display:flex;gap:8px;">
<button class="btn" id="cb${g.id}" style="background:rgba(245,158,11,0.1);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);" onclick="copy(${g.id},'${esc(g.detection_gap_explanation)}')">📋 Copy Gap Text</button>
<button class="btn bgho" onclick="used(${g.id})">✓ Mark Used</button>
</div></div>`).join(''):`<div class="empty"><div style="font-size:36px;margin-bottom:12px;">📚</div><div style="font-family:var(--mono);font-size:11px;letter-spacing:1px;">No gaps yet — analyze escalations to build your library</div></div>`;}
function esc(s){return(s||'').replace(/'/g,"\'").replace(/\n/g,' ');}
async function copy(id,text){await navigator.clipboard.writeText(text);const b=document.getElementById('cb'+id);b.textContent='✓ Copied!';b.style.color='#10b981';setTimeout(()=>{b.textContent='📋 Copy Gap Text';b.style.color='#f59e0b';},2000);used(id);}
async function used(id){await fetch('/api/gaps/'+id+'/use',{method:'POST'});const g=all.find(x=>x.id===id);if(g)g.usage_count=(g.usage_count||1)+1;filt();}
load();
</script></body></html>
